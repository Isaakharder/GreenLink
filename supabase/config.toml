project_id = "greenlink"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[realtime]
enabled = true

[edge_runtime]
enabled = true

[functions.golf-course-lookup]
# Only authenticated GreenLink users can trigger a GolfCourseAPI call --
# protects the external API's rate limit/quota from anonymous abuse.
verify_jwt = true
